name: release

on:
  # Self-tagged prerelease builds: each run mints its own timestamp+hash tag and
  # derives the MSI ProductVersion from the same UTC build time (see "Determine
  # version"), so there is no v* tag trigger and nothing to customize.
  workflow_dispatch:

jobs:
  release-msi:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout ezvpn-windows
        uses: actions/checkout@v4
        with:
          path: gui

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $now = (Get-Date).ToUniversalTime()
          # Release tag: UTC timestamp + short commit hash, always a prerelease.
          $sha = "${{ github.sha }}".Substring(0, 7)
          $ts = $now.ToString('yyyyMMddHHmmss')
          $tag = "$ts-$sha"
          # MSI ProductVersion is derived from the same build time — not
          # user-supplied. MSI compares major.minor.build (major/minor <= 255,
          # build <= 65535; the 4th field is ignored), so encode the timestamp as
          # a monotonically increasing version that keeps MajorUpgrade working:
          #   major = years since 2000, minor = month, build = minutes into month.
          $major = $now.Year - 2000
          $minor = $now.Month
          $build = $now.Day * 1440 + $now.Hour * 60 + $now.Minute
          $product = "$major.$minor.$build.0"
          "product=$product"      >> $env:GITHUB_OUTPUT
          "release_tag=$tag"      >> $env:GITHUB_OUTPUT

      - name: Publish app (self-contained)
        shell: pwsh
        # No Rust / core build here: native.targets downloads the prebuilt,
        # SHA256-verified ezvpn.dll from the pinned ezvpn release (and wintun.dll
        # from wintun.net) during publish. Update the pin with scripts\bump-dll.ps1.
        run: |
          dotnet publish gui/src/Ezvpn.App/Ezvpn.App.csproj `
            -c Release -r win-x64 --self-contained `
            -o publish
          # Sanity: native.targets must have staged both DLLs into the publish output.
          if (-not (Test-Path publish/ezvpn.dll)) { throw "ezvpn.dll missing from publish" }
          if (-not (Test-Path publish/wintun.dll)) { throw "wintun.dll missing from publish" }

      - name: Build MSI
        shell: pwsh
        run: |
          $pub = (Resolve-Path publish).Path
          dotnet build gui/installer/Ezvpn.Installer.wixproj `
            -c Release "-p:PublishDir=$pub" "-p:ProductVersion=${{ steps.ver.outputs.product }}"
          Copy-Item gui/installer/bin/Release/ezvpn.msi "ezvpn-${{ steps.ver.outputs.release_tag }}.msi"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezvpn-msi
          path: ezvpn-*.msi

      - name: Publish prerelease
        # Always a prerelease, tagged yyyymmddhhmmss-<short-sha>. The tag is created
        # on the triggering commit if it does not already exist.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.release_tag }}
          name: ${{ steps.ver.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: ezvpn-*.msi
